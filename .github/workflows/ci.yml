name: CI SDK Java

on:
  push:
    paths:
      - "sdks/java/**"
  pull_request:
    paths:
      - "sdks/java/**"

defaults:
  run:
    working-directory: sdks/java

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: ["11", "17", "21"]
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Compilar e rodar testes unit e de webhook
        run: mvn -q -B test
        env:
          FLUVPAY_TEST_KEY: ${{ secrets.FLUVPAY_TEST_KEY }}
